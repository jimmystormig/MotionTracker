services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: motiontracker
      POSTGRES_USER: motiontracker
      POSTGRES_PASSWORD: motiontracker
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motiontracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://motiontracker:motiontracker@db:5432/motiontracker
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./static:/app/static
      - ./migrations:/app/migrations

volumes:
  pgdata:
